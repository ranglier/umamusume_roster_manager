<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Umanager</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=20260721">
  <link rel="stylesheet" href="./assets/app.css?v=20260721">
  <script charset="utf-8" src="./data/reference-data.js" defer></script>
  <script type="module" charset="utf-8" src="./assets/app.js?v=20260721"></script>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <linearGradient id="ug" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#4fd8ff"/>
        <stop offset=".5" stop-color="#5fe6a0"/>
        <stop offset="1" stop-color="#f0c85a"/>
      </linearGradient>
    </defs>
  </svg>
  <div id="profileBackgroundMedia" class="profile-background-media" hidden aria-hidden="true">
    <video id="profileBackgroundVideo" class="profile-background-video" autoplay muted loop playsinline>
      <source src="./assets/profile-selection-bg.mp4" type="video/mp4">
    </video>
  </div>
  <div class="page-shell">
    <div id="sidebarBackdrop" class="sidebar-backdrop" onclick="window.umaSidebar&&window.umaSidebar.close()"></div>
    <nav id="appSidebar" class="app-sidebar" aria-label="Sections" hidden>
      <div class="app-sidebar-brand">
        <svg class="app-sidebar-brand-mark" width="24" height="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="4" y="4" width="92" height="92" rx="23" fill="url(#ug)"/>
          <path d="M33 30 V52 a17 17 0 0 0 34 0 V30" fill="none" stroke="#0d1512" stroke-width="13" stroke-linecap="round"/>
        </svg>
        <span class="app-sidebar-brand-text">Umanager</span>
      </div>
      <div id="sidebarSections" class="sidebar-sections"></div>
      <nav id="entityNav" class="entity-nav sidebar-subnav" aria-label="Datasets"></nav>
      <div class="sidebar-footer">
        <div id="activeProfileBlock" class="meta-block">
          <span class="meta-label">Active Profile</span>
          <strong id="activeProfileName">No profile selected</strong>
          <div class="active-profile-actions">
            <button id="changeProfileButton" type="button">Change profile</button>
            <button id="adminButton" class="button-secondary" type="button">Administration</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="app-layout">
      <main class="main-column">
        <header id="topHeader" class="top-header panel">
          <div class="top-header-copy">
            <h1 id="pageTitle">Umanager</h1>
            <p class="hero-text" id="summaryText">
              Static local reference built from versioned GameTora datasets.
            </p>
          </div>
          <div class="top-header-meta">
            <div id="lastBuildBlock" class="meta-block">
              <span class="meta-label">Last Local Build</span>
              <strong id="globalBuild">-</strong>
            </div>
          </div>
        </header>

        <section id="profileGate" class="panel profile-gate" hidden></section>

        <section id="datasetBar" class="dataset-bar panel" hidden>
          <div class="section-heading compact-heading">
            <div>
              <h2 id="datasetHeading">Datasets</h2>
            </div>
          </div>
        </section>

        <section id="toolbar" class="toolbar panel">
          <div class="toolbar-top">
            <div class="toolbar-top-lead">
              <button class="sidebar-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="appSidebar" onclick="window.umaSidebar&&window.umaSidebar.toggle()">
                <span class="sidebar-toggle-bars" aria-hidden="true"></span>
              </button>
              <div>
                <h2 id="entityTitle">Characters</h2>
                <p id="entityMeta" class="entity-meta"></p>
              </div>
            </div>
            <div class="toolbar-top-side">
              <div id="browseActions" class="browse-actions"></div>
              <p id="resultCount" class="count-chip">0 visible</p>
            </div>
          </div>

          <div class="search-row">
            <input id="searchInput" type="search" placeholder="Search in current dataset">
            <button id="clearButton" type="button">Reset</button>
          </div>

          <div id="filters" class="filters"></div>
        </section>

        <section id="resultsPanel" class="panel results-panel">
          <div class="section-heading">
            <div>
              <h2>Results</h2>
            </div>
          </div>
          <div id="list" class="result-list"></div>
        </section>
      </main>

      <aside id="detailColumn" class="detail-column">
        <section class="panel detail-panel">
          <div id="detail" class="detail-view"></div>
        </section>
      </aside>
    </div>
  </div>

  <button id="backToTopButton" class="back-to-top" type="button" aria-label="Back to top">
    Haut
  </button>
</body>
</html>
